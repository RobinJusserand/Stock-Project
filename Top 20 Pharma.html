<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Performance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #263346;
      --accent:   #dc2626;
      --accent-h: #b91c1c;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --border:   #334155;
      --radius:   10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background-color: var(--surface);
      color: var(--text);
      text-align: center;
      padding: 1.25em;
      border-bottom: 1px solid var(--border);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    section {
      max-width: 960px;
      margin: 20px auto;
      background-color: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 11px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: var(--surface2);
      color: var(--muted);
      font-size: 0.85em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }

    tbody tr:hover { background-color: rgba(220, 38, 38, 0.07); }
    tbody tr.active-row {
      background-color: rgba(220, 38, 38, 0.12);
      border-left: 3px solid var(--accent);
      font-weight: bold;
    }

    .positive { color: #4ade80; font-weight: bold; }
    .negative { color: #f87171; font-weight: bold; }
    .neutral  { color: var(--muted); }

    .changeDateRange {
      font-size: 0.78em;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      font-weight: normal;
      opacity: 0.7;
    }

    #loader {
      text-align: center;
      padding: 30px;
      font-size: 16px;
      color: var(--muted);
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errorBanner {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
    }

    #cacheNotice {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #93c5fd;
      padding: 8px 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.85em;
      display: none;
    }

    .btn {
      background-color: var(--accent);
      color: white;
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-right: 8px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn:hover { background-color: var(--accent-h); transform: translateY(-1px); }

    .btn-blue {
      background-color: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-blue:hover { background-color: var(--border); }

    #homeButton {
      position: fixed;
      top: 12px;
      left: 12px;
      background-color: var(--surface);
      color: var(--text);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s;
    }
    #homeButton:hover { border-color: var(--accent); color: var(--accent); }

    .tip {
      font-size: 0.82em;
      color: var(--muted);
      margin-top: 8px;
    }

    #chartSection h2 { margin-bottom: 4px; color: var(--text); }
    #chartSubtitle {
      font-size: 0.85em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    canvas { width: 100%; }
  </style>
</head>

<body>
  <header>
    <h1>Stock Performance Tracker</h1>
  </header>

  <section id="stockSection">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
      <div>
        <button class="btn btn-blue" onclick="loadAllStocks(false)">⟳ Refresh</button>
        <button class="btn btn-blue" onclick="loadAllStocks(true)">↺ Force Refresh (bypass cache)</button>
        <button class="btn" onclick="window.location.href='index.html'">Home</button>
      </div>
    </div>

    <div id="cacheNotice"></div>
    <div id="errorBanner"></div>
    <div id="loader"><span class="spinner"></span> Loading all stocks in parallel…</div>

    <div id="stockData"></div>
    <p class="tip">Click any row to update the chart below.</p>
  </section>

  <section id="chartSection">
    <h2 id="chartTitle">Stock Evolution</h2>
    <p id="chartSubtitle">Click a row above to view its price history.</p>
    <canvas id="stockChart"></canvas>
  </section>

  <button id="homeButton" onclick="window.location.href='index.html'">Home</button>

  <script>
    const API_KEY   = "019effbed54c4b939010eb1072ff71bc";
    const CACHE_TTL = 60 * 60 * 1000; // 1 hour

    const companies = [
      { symbol: 'LLY',   name: 'Eli Lilly' },
      { symbol: 'NVO',   name: 'Novo Nordisk' },
      { symbol: 'JNJ',   name: 'Johnson & Johnson' },
      { symbol: 'MRK',   name: 'Merck' },
      { symbol: 'NVS',   name: 'Novartis' },
      { symbol: 'AZN',   name: 'AstraZeneca' },
      { symbol: 'PFE',   name: 'Pfizer' },
      { symbol: 'SNY',   name: 'Sanofi' },
      { symbol: 'BMY',   name: 'Bristol-Myers Squibb' },
      { symbol: 'NVDA',  name: 'Nvidia' },
      { symbol: 'TSLA',  name: 'Tesla' },
      { symbol: 'AAPL',  name: 'Apple' },
      { symbol: 'MC.PA', name: 'LVMH' },
      { symbol: 'MSFT',  name: 'Microsoft' },
    ];

    let chartInstance = null;
    let activeSymbol  = null;

    // ─── Load all stocks — batch fetch + per-symbol cache ─────────────────
    async function loadAllStocks(forceRefresh = false) {
      showLoader(true);
      clearMessages();
      document.getElementById('stockData').innerHTML = '';

      // Step 1: split companies into cached vs needs-fetching
      const cachedResults = {};
      const toFetch       = [];

      for (const company of companies) {
        const hit = !forceRefresh && getCached(company.symbol);
        if (hit) {
          cachedResults[company.symbol] = hit;
        } else {
          toFetch.push(company);
        }
      }

      // Step 2: fetch all stale/missing symbols in ONE batch request
      const freshResults = {};
      if (toFetch.length > 0) {
        const symbolList = toFetch.map(c => c.symbol).join(',');
        const url = `https://api.twelvedata.com/time_series?symbol=${symbolList}&interval=1day&outputsize=60&apikey=${API_KEY}`;

        try {
          const res  = await fetch(url);
          const data = await res.json();

          for (const company of toFetch) {
            const sym = company.symbol;
            // When only 1 symbol is requested Twelve Data returns the data directly (no wrapper)
            const entry = toFetch.length === 1 ? data : data[sym];

            if (!entry || entry.status === 'error') {
              const code = entry?.code;
              freshResults[sym] = { symbol: sym, name: company.name, error: code === 429 ? 'rate_limit' : 'invalid' };
            } else if (!entry.values || entry.values.length === 0) {
              freshResults[sym] = { symbol: sym, name: company.name, error: 'no_data' };
            } else {
              // Save to cache
              localStorage.setItem(`twelvedata_${sym}`, JSON.stringify({ timestamp: Date.now(), values: entry.values }));
              freshResults[sym] = { symbol: sym, name: company.name, values: entry.values, fromCache: false };
            }
          }
        } catch (err) {
          for (const company of toFetch) {
            freshResults[company.symbol] = { symbol: company.symbol, name: company.name, error: 'network' };
          }
        }
      }

      // Step 3: merge results in original company order
      const results = companies.map(c => cachedResults[c.symbol] || freshResults[c.symbol] || { symbol: c.symbol, name: c.name, error: 'unknown' });

      showLoader(false);
      renderTable(results);

      // Cache notice
      const fromCacheList = results.filter(r => r.fromCache);
      if (fromCacheList.length > 0) {
        const mins = Math.round((Date.now() - fromCacheList[0].cachedAt) / 60000);
        showCacheNotice(`${fromCacheList.length} of ${companies.length} stocks loaded from cache (${mins} min old). Click "Force Refresh" to fetch live data.`);
      }

      // Rate limit warning
      if (results.some(r => r.error === 'rate_limit')) {
        showError('API rate limit hit for one or more stocks. Wait a moment and click Refresh.');
      }

      // Auto-show first valid result in chart
      const first = results.find(r => r.values);
      if (first) showEvolution(first.symbol, results);
    }

    // ─── Build and render table ────────────────────────────────────────────
    function renderTable(results) {
      const firstValid = results.find(r => r.values && r.values.length > 1);
      let dailyRange = '', weeklyRange = '', monthlyRange = '';

      if (firstValid) {
        const v = firstValid.values;
        dailyRange   = `${v[1].datetime} → ${v[0].datetime}`;
        weeklyRange  = `${v[Math.min(5,  v.length-1)].datetime} → ${v[0].datetime}`;
        monthlyRange = `${v[Math.min(21, v.length-1)].datetime} → ${v[0].datetime}`;
      }

      const rows = results.map(r => buildRow(r)).join('');

      document.getElementById('stockData').innerHTML = `
        <table id="stockTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Price</th>
              <th>Daily Change <span class="changeDateRange">${dailyRange}</span></th>
              <th>Weekly Change <span class="changeDateRange">${weeklyRange}</span></th>
              <th>Monthly Change <span class="changeDateRange">${monthlyRange}</span></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      // Wire up row clicks — pass all results so chart can use cached values
      document.querySelectorAll('#stockTable tbody tr[data-symbol]').forEach(row => {
        row.addEventListener('click', () => showEvolution(row.dataset.symbol, results));
      });
    }

    function buildRow(stock) {
      if (stock.error) {
        const msg = {
          rate_limit: 'Rate limit — click Refresh in 1 min',
          invalid:    'Symbol not found',
          no_data:    'No data available',
          network:    'Network error',
        }[stock.error] || 'Error';
        return `<tr><td colspan="5" style="color:var(--muted);text-align:left;padding-left:12px;">${stock.symbol}: ${msg}</td></tr>`;
      }

      const v      = stock.values;
      const latest = parseFloat(v[0].close);
      const prev   = parseFloat(v[1].close);
      const week   = parseFloat(v[Math.min(5,  v.length-1)].close);
      const month  = parseFloat(v[Math.min(21, v.length-1)].close);

      const dChg = latest - prev;
      const wChg = latest - week;
      const mChg = latest - month;

      const fmt = (n) => Math.abs(n).toFixed(2);
      const pct = (chg, base) => Math.abs((chg / base) * 100).toFixed(2);
      const arr = (n) => n > 0 ? '▲ ' : n < 0 ? '▼ ' : '';

      return `
        <tr data-symbol="${stock.symbol}" title="Click to view chart">
          <td style="text-align:left;">
            <strong>${stock.name}</strong>
            <span style="color:var(--muted);font-size:0.85em;margin-left:4px;">${stock.symbol}</span>
          </td>
          <td>$${latest.toFixed(2)}</td>
          <td class="${colorClass(dChg)}">${arr(dChg)}$${fmt(dChg)} (${pct(dChg, prev)}%)</td>
          <td class="${colorClass(wChg)}">${arr(wChg)}$${fmt(wChg)} (${pct(wChg, week)}%)</td>
          <td class="${colorClass(mChg)}">${arr(mChg)}$${fmt(mChg)} (${pct(mChg, month)}%)</td>
        </tr>
      `;
    }

    // ─── Chart ─────────────────────────────────────────────────────────────
    async function showEvolution(symbol, allResults) {
      // Highlight active row
      document.querySelectorAll('#stockTable tbody tr').forEach(r => r.classList.remove('active-row'));
      const row = document.querySelector(`tr[data-symbol="${symbol}"]`);
      if (row) row.classList.add('active-row');

      activeSymbol = symbol;

      // Use already-fetched data from allResults if available, then try cache, then skip
      let stock = allResults?.find(r => r.symbol === symbol && r.values);
      if (!stock) stock = getCached(symbol);
      if (!stock || stock.error || !stock.values) return;

      const reversed = [...stock.values].reverse();
      const labels   = reversed.map(v => v.datetime);
      const prices   = reversed.map(v => parseFloat(v.close));

      // Destroy old chart
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      document.getElementById('chartTitle').textContent    = `${stock.name} (${symbol}) — Last ${stock.values.length} Trading Days`;
      document.getElementById('chartSubtitle').textContent = '';

      const ctx = document.getElementById('stockChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: `${symbol} Closing Price`,
            data: prices,
            borderColor: 'rgba(220, 38, 38, 0.9)',
            backgroundColor: 'rgba(220, 38, 38, 0.08)',
            borderWidth: 2,
            pointRadius: 2,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true },
            tooltip: { callbacks: { label: (ctx) => ` $${ctx.parsed.y.toFixed(2)}` } }
          },
          scales: {
            x: {
              ticks: { maxTicksLimit: 10, maxRotation: 30, color: '#94a3b8' },
              grid: { color: 'rgba(51, 65, 85, 0.6)' }
            },
            y: {
              ticks: { callback: (v) => `$${v.toFixed(0)}`, color: '#94a3b8' },
              grid: { color: 'rgba(51, 65, 85, 0.6)' }
            }
          }
        }
      });
    }

    // ─── Cache helper ──────────────────────────────────────────────────────
    function getCached(symbol) {
      try {
        const raw = localStorage.getItem(`twelvedata_${symbol}`);
        if (!raw) return null;
        const { timestamp, values } = JSON.parse(raw);
        if (Date.now() - timestamp < CACHE_TTL) {
          return { symbol, name: companies.find(c => c.symbol === symbol)?.name, values, fromCache: true, cachedAt: timestamp };
        }
      } catch (_) {}
      return null;
    }

    // ─── Helpers ───────────────────────────────────────────────────────────
    function colorClass(n) { return n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral'; }

    function showLoader(show) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
    }
    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function showCacheNotice(msg) {
      const el = document.getElementById('cacheNotice');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearMessages() {
      document.getElementById('errorBanner').style.display = 'none';
      document.getElementById('cacheNotice').style.display = 'none';
    }

    // ─── Init ──────────────────────────────────────────────────────────────
    window.onload = () => loadAllStocks(false);
  </script>

</body>
</html>
