<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Performance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
    }
    section {
      max-width: 960px;
      margin: 20px auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 11px 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #333;
      color: white;
      font-size: 0.9em;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr:hover { background-color: #f0f7ff; }
    tbody tr.active-row {
      background-color: #e3f2fd;
      font-weight: bold;
    }

    .positive { color: #2e7d32; font-weight: bold; }
    .negative { color: #c62828; font-weight: bold; }
    .neutral  { color: #555; }

    .changeDateRange {
      font-size: 0.8em;
      color: #aaa;
      display: block;
      margin-top: 2px;
      font-weight: normal;
    }

    #loader {
      text-align: center;
      padding: 30px;
      font-size: 16px;
      color: #555;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errorBanner {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
    }
    #cacheNotice {
      background: #e8f4fd;
      border: 1px solid #b3d9f7;
      color: #1565c0;
      padding: 8px 14px;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 0.85em;
      display: none;
    }

    .btn {
      background-color: #4caf50;
      color: white;
      padding: 9px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 8px;
    }
    .btn:hover { background-color: #45a049; }
    .btn-blue { background-color: #1976d2; }
    .btn-blue:hover { background-color: #1565c0; }

    #homeButton {
      position: fixed;
      top: 10px;
      left: 10px;
      background-color: #333;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #homeButton:hover { background-color: #555; }

    .tip {
      font-size: 0.82em;
      color: #888;
      margin-top: 8px;
    }

    #chartSection h2 { margin-bottom: 4px; }
    #chartSubtitle {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 12px;
    }
    canvas { width: 100%; }
  </style>
</head>

<body>
  <header>
    <h1>Stock Performance Tracker</h1>
  </header>

  <section id="stockSection">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
      <div>
        <button class="btn btn-blue" onclick="loadAllStocks(false)">⟳ Refresh</button>
        <button class="btn btn-blue" onclick="loadAllStocks(true)">↺ Force Refresh (bypass cache)</button>
        <button class="btn" onclick="window.location.href='index.html'">Home</button>
      </div>
    </div>

    <div id="cacheNotice"></div>
    <div id="errorBanner"></div>
    <div id="loader"><span class="spinner"></span> Loading all stocks in parallel…</div>

    <div id="stockData"></div>
    <p class="tip">Click any row to update the chart below.</p>
  </section>

  <section id="chartSection">
    <h2 id="chartTitle">Stock Evolution</h2>
    <p id="chartSubtitle">Click a row above to view its price history.</p>
    <canvas id="stockChart"></canvas>
  </section>

  <button id="homeButton" onclick="window.location.href='index.html'">Home</button>

  <script>
    const API_KEY   = "019effbed54c4b939010eb1072ff71bc";
    const CACHE_TTL = 60 * 60 * 1000; // 1 hour

    const companies = [
      { symbol: 'LLY',   name: 'Eli Lilly' },
      { symbol: 'NVO',   name: 'Novo Nordisk' },
      { symbol: 'JNJ',   name: 'Johnson & Johnson' },
      { symbol: 'MRK',   name: 'Merck' },
      { symbol: 'NVS',   name: 'Novartis' },
      { symbol: 'AZN',   name: 'AstraZeneca' },
      { symbol: 'PFE',   name: 'Pfizer' },
      { symbol: 'SNY',   name: 'Sanofi' },
      { symbol: 'BMY',   name: 'Bristol-Myers Squibb' },
      { symbol: 'NVDA',  name: 'Nvidia' },
      { symbol: 'TSLA',  name: 'Tesla' },
      { symbol: 'AAPL',  name: 'Apple' },
      { symbol: 'MC.PA', name: 'LVMH' },
      { symbol: 'MSFT',  name: 'Microsoft' },
    ];

    let chartInstance = null;
    let activeSymbol  = null;

    // ─── Fetch single stock with localStorage cache ────────────────────────
    async function fetchStockData(symbol, forceRefresh = false) {
      const cacheKey = `twelvedata_${symbol}`;

      if (!forceRefresh) {
        try {
          const cached = localStorage.getItem(cacheKey);
          if (cached) {
            const { timestamp, values } = JSON.parse(cached);
            if (Date.now() - timestamp < CACHE_TTL) {
              return { symbol, name: companies.find(c => c.symbol === symbol)?.name, values, fromCache: true, cachedAt: timestamp };
            }
          }
        } catch (_) { /* ignore corrupt cache */ }
      }

      const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=60&apikey=${API_KEY}`;
      try {
        const res  = await fetch(url);
        const data = await res.json();

        if (data.status === "error") {
          return { symbol, name: companies.find(c => c.symbol === symbol)?.name, error: data.code === 429 ? 'rate_limit' : 'invalid', message: data.message };
        }
        if (!data.values || data.values.length === 0) {
          return { symbol, error: 'no_data' };
        }

        // Save to cache
        localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), values: data.values }));

        return { symbol, name: companies.find(c => c.symbol === symbol)?.name, values: data.values, fromCache: false };

      } catch (err) {
        return { symbol, name: companies.find(c => c.symbol === symbol)?.name, error: 'network' };
      }
    }

    // ─── Load all stocks in parallel ──────────────────────────────────────
    async function loadAllStocks(forceRefresh = false) {
      showLoader(true);
      clearMessages();
      document.getElementById('stockData').innerHTML = '';

      const results = await Promise.all(companies.map(c => fetchStockData(c.symbol, forceRefresh)));

      showLoader(false);
      renderTable(results);

      // Cache notice — if any came from cache show how old
      const cachedResults = results.filter(r => r.fromCache);
      if (cachedResults.length > 0) {
        const mins = Math.round((Date.now() - cachedResults[0].cachedAt) / 60000);
        showCacheNotice(`${cachedResults.length} of ${companies.length} stocks loaded from cache (${mins} min old). Click "Force Refresh" to fetch live data.`);
      }

      // Rate limit warning
      if (results.some(r => r.error === 'rate_limit')) {
        showError('API rate limit hit for one or more stocks. Wait a moment and click Refresh.');
      }

      // Auto-show first valid result in chart
      const first = results.find(r => r.values);
      if (first) showEvolution(first.symbol, results);
    }

    // ─── Build and render table ────────────────────────────────────────────
    function renderTable(results) {
      const firstValid = results.find(r => r.values && r.values.length > 1);
      let dailyRange = '', weeklyRange = '', monthlyRange = '';

      if (firstValid) {
        const v = firstValid.values;
        dailyRange   = `${v[1].datetime} → ${v[0].datetime}`;
        weeklyRange  = `${v[Math.min(5,  v.length-1)].datetime} → ${v[0].datetime}`;
        monthlyRange = `${v[Math.min(21, v.length-1)].datetime} → ${v[0].datetime}`;
      }

      const rows = results.map(r => buildRow(r)).join('');

      document.getElementById('stockData').innerHTML = `
        <table id="stockTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Price</th>
              <th>Daily Change <span class="changeDateRange">${dailyRange}</span></th>
              <th>Weekly Change <span class="changeDateRange">${weeklyRange}</span></th>
              <th>Monthly Change <span class="changeDateRange">${monthlyRange}</span></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      // Wire up row clicks — pass all results so chart can use cached values
      document.querySelectorAll('#stockTable tbody tr[data-symbol]').forEach(row => {
        row.addEventListener('click', () => showEvolution(row.dataset.symbol, results));
      });
    }

    function buildRow(stock) {
      if (stock.error) {
        const msg = {
          rate_limit: 'Rate limit — click Refresh in 1 min',
          invalid:    'Symbol not found',
          no_data:    'No data available',
          network:    'Network error',
        }[stock.error] || 'Error';
        return `<tr><td colspan="5" style="color:#aaa;text-align:left;padding-left:12px;">${stock.symbol}: ${msg}</td></tr>`;
      }

      const v      = stock.values;
      const latest = parseFloat(v[0].close);
      const prev   = parseFloat(v[1].close);
      const week   = parseFloat(v[Math.min(5,  v.length-1)].close);
      const month  = parseFloat(v[Math.min(21, v.length-1)].close);

      const dChg = latest - prev;
      const wChg = latest - week;
      const mChg = latest - month;

      const fmt = (n) => Math.abs(n).toFixed(2);
      const pct = (chg, base) => Math.abs((chg / base) * 100).toFixed(2);
      const arr = (n) => n > 0 ? '▲ ' : n < 0 ? '▼ ' : '';

      return `
        <tr data-symbol="${stock.symbol}" title="Click to view chart">
          <td style="text-align:left;">
            <strong>${stock.name}</strong>
            <span style="color:#888;font-size:0.85em;margin-left:4px;">${stock.symbol}</span>
          </td>
          <td>$${latest.toFixed(2)}</td>
          <td class="${colorClass(dChg)}">${arr(dChg)}$${fmt(dChg)} (${pct(dChg, prev)}%)</td>
          <td class="${colorClass(wChg)}">${arr(wChg)}$${fmt(wChg)} (${pct(wChg, week)}%)</td>
          <td class="${colorClass(mChg)}">${arr(mChg)}$${fmt(mChg)} (${pct(mChg, month)}%)</td>
        </tr>
      `;
    }

    // ─── Chart ─────────────────────────────────────────────────────────────
    async function showEvolution(symbol, allResults) {
      // Highlight active row
      document.querySelectorAll('#stockTable tbody tr').forEach(r => r.classList.remove('active-row'));
      const row = document.querySelector(`tr[data-symbol="${symbol}"]`);
      if (row) row.classList.add('active-row');

      activeSymbol = symbol;

      // Use already-fetched data from allResults if available, otherwise fetch fresh
      let stock = allResults?.find(r => r.symbol === symbol && r.values);
      if (!stock) stock = await fetchStockData(symbol);
      if (!stock || stock.error || !stock.values) return;

      const reversed = [...stock.values].reverse();
      const labels   = reversed.map(v => v.datetime);
      const prices   = reversed.map(v => parseFloat(v.close));

      // Destroy old chart
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      document.getElementById('chartTitle').textContent    = `${stock.name} (${symbol}) — Last ${stock.values.length} Trading Days`;
      document.getElementById('chartSubtitle').textContent = '';

      const ctx = document.getElementById('stockChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: `${symbol} Closing Price`,
            data: prices,
            borderColor: 'rgba(75, 192, 192, 1)',
            backgroundColor: 'rgba(75, 192, 192, 0.08)',
            borderWidth: 2,
            pointRadius: 2,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true },
            tooltip: { callbacks: { label: (ctx) => ` $${ctx.parsed.y.toFixed(2)}` } }
          },
          scales: {
            x: { ticks: { maxTicksLimit: 10, maxRotation: 30 } },
            y: { ticks: { callback: (v) => `$${v.toFixed(0)}` } }
          }
        }
      });
    }

    // ─── Helpers ───────────────────────────────────────────────────────────
    function colorClass(n) { return n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral'; }

    function showLoader(show) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
    }
    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function showCacheNotice(msg) {
      const el = document.getElementById('cacheNotice');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearMessages() {
      document.getElementById('errorBanner').style.display = 'none';
      document.getElementById('cacheNotice').style.display = 'none';
    }

    // ─── Init ──────────────────────────────────────────────────────────────
    window.onload = () => loadAllStocks(false);
  </script>

</body>
</html>
