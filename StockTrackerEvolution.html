<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #263346;
      --accent:   #dc2626;
      --accent-h: #b91c1c;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --border:   #334155;
      --radius:   10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background-color: var(--surface);
      color: var(--text);
      text-align: center;
      padding: 1.25em;
      border-bottom: 1px solid var(--border);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    section {
      max-width: 800px;
      margin: 20px auto;
      background-color: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); opacity: 0.6; }

    button {
      background-color: var(--accent);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background-color: var(--accent-h); transform: translateY(-1px); }

    #stockData { margin-top: 20px; }
    #stockData p {
      margin: 8px 0;
      font-size: 0.95rem;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .positive { color: #4ade80; font-weight: bold; }
    .negative { color: #f87171; font-weight: bold; }
    .neutral  { color: var(--muted); }

    canvas { width: 100%; margin-top: 20px; }

    #homeButton {
      position: fixed;
      top: 12px;
      left: 12px;
      background-color: var(--surface);
      color: var(--text);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s;
    }
    #homeButton:hover { border-color: var(--accent); color: var(--accent); }

    #loader {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errorMsg {
      color: #fca5a5;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      margin-top: 10px;
    }

    #cacheNotice {
      font-size: 0.82em;
      color: #93c5fd;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 8px 14px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Stock Tracker</h1>
</header>

<section id="stockSelection">
  <form id="stockForm" onsubmit="event.preventDefault(); getStockData(false);">
    <label for="stockSymbol">Enter Stock Symbol (e.g. AAPL, TSLA, MSFT):</label>
    <input type="text" id="stockSymbol" placeholder="e.g. AAPL" required />
    <button type="submit">Get Data</button>
    <button type="button" onclick="getStockData(true)" style="background:var(--surface2);border:1px solid var(--border);margin-left:8px;">Force Refresh</button>
  </form>
  <div id="loader"><span class="spinner"></span> Fetching stock data…</div>
  <div id="errorMsg"></div>
  <div id="cacheNotice"></div>
</section>

<section id="stockData">
  <!-- Stock information will appear here -->
</section>

<section id="chartSection" style="display:none;">
  <h2 id="chartTitle">Price History</h2>
  <canvas id="stockChart"></canvas>
</section>

<button id="homeButton" onclick="window.location.href='index.html'">Home</button>

<script>
  const API_KEY     = "019effbed54c4b939010eb1072ff71bc";
  const CACHE_TTL   = 60 * 60 * 1000; // 1 hour in ms
  let   chartInstance = null;

  // ─── Main entry point ────────────────────────────────────────────────────
  async function getStockData(forceRefresh = false) {
    const symbol = document.getElementById("stockSymbol").value.trim().toUpperCase();
    if (!symbol) return;

    showLoader(true);
    clearError();
    document.getElementById("stockData").innerHTML = "";
    document.getElementById("chartSection").style.display = "none";
    document.getElementById("cacheNotice").style.display = "none";

    try {
      const { values, fromCache, cachedAt } = await fetchWithCache(symbol, forceRefresh);
      updateStockData(values, symbol);
      renderChart(values, symbol);

      if (fromCache) {
        const mins = Math.round((Date.now() - cachedAt) / 60000);
        showCacheNotice(`Showing cached data from ${mins} minute${mins !== 1 ? 's' : ''} ago. Click "Force Refresh" for live data.`);
      }
    } catch (err) {
      showError(err.message);
    } finally {
      showLoader(false);
    }
  }

  // ─── Fetch with localStorage cache ───────────────────────────────────────
  async function fetchWithCache(symbol, forceRefresh) {
    const cacheKey = `twelvedata_${symbol}`;

    if (!forceRefresh) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const { timestamp, values } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TTL) {
          return { values, fromCache: true, cachedAt: timestamp };
        }
      }
    }

    // Live fetch
    const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=60&apikey=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();

    // Handle Twelve Data errors
    if (data.status === "error") {
      if (data.code === 429) throw new Error("API rate limit reached. Please wait a moment and try again.");
      if (data.code === 400) throw new Error(`Symbol "${symbol}" not found. Please check the ticker and try again.`);
      throw new Error(data.message || "Unknown API error.");
    }
    if (!data.values || data.values.length === 0) {
      throw new Error("No data returned. The symbol may be invalid or delisted.");
    }

    // Save to cache
    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), values: data.values }));

    return { values: data.values, fromCache: false };
  }

  // ─── Render metrics ───────────────────────────────────────────────────────
  // Twelve Data returns values[] newest-first:
  // values[0] = today, values[1] = yesterday, values[5] = ~1 week ago, values[21] = ~1 month ago
  function updateStockData(values, symbol) {
    if (values.length < 2) {
      showError("Not enough data available for this stock.");
      return;
    }

    const latest  = parseFloat(values[0].close);
    const prev    = parseFloat(values[1].close);
    const weekVal = parseFloat(values[Math.min(5,  values.length - 1)].close);
    const monVal  = parseFloat(values[Math.min(21, values.length - 1)].close);

    const latestDate = values[0].datetime;
    const prevDate   = values[1].datetime;
    const weekDate   = values[Math.min(5,  values.length - 1)].datetime;
    const monDate    = values[Math.min(21, values.length - 1)].datetime;

    const dChg = latest - prev;
    const wChg = latest - weekVal;
    const mChg = latest - monVal;

    const fmt = (n) => Math.abs(n).toFixed(2);
    const pct = (chg, base) => ((chg / base) * 100).toFixed(2);
    const sgn = (n) => n >= 0 ? '+' : '-';

    document.getElementById("stockData").innerHTML = `
      <h2 style="margin-bottom:12px;">${symbol}</h2>
      <p><strong>Latest Closing Price:</strong> $${latest.toFixed(2)} <span style="color:#aaa;font-size:0.85em;">(${latestDate})</span></p>
      <p>
        <strong>Daily Change</strong>
        <span style="font-size:0.85em;color:gray;">(${prevDate} → ${latestDate})</span>:
        <span class="${colorClass(dChg)}">${sgn(dChg)}$${fmt(dChg)} (${pct(dChg, prev)}%)</span>
      </p>
      <p>
        <strong>Weekly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${weekDate} → ${latestDate})</span>:
        <span class="${colorClass(wChg)}">${sgn(wChg)}$${fmt(wChg)} (${pct(wChg, weekVal)}%)</span>
      </p>
      <p>
        <strong>Monthly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${monDate} → ${latestDate})</span>:
        <span class="${colorClass(mChg)}">${sgn(mChg)}$${fmt(mChg)} (${pct(mChg, monVal)}%)</span>
      </p>
    `;
  }

  // ─── Chart ─────────────────────────────────────────────────────────────────
  function renderChart(values, symbol) {
    // Reverse so chart goes oldest → newest (left to right)
    const reversed = [...values].reverse();
    const labels = reversed.map(v => v.datetime);
    const prices = reversed.map(v => parseFloat(v.close));

    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    document.getElementById("chartTitle").textContent = `${symbol} — Last ${values.length} Trading Days`;
    document.getElementById("chartSection").style.display = "block";

    const ctx = document.getElementById("stockChart").getContext("2d");
    chartInstance = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: `${symbol} Closing Price`,
          data: prices,
          borderColor: "rgba(220, 38, 38, 0.9)",
          backgroundColor: "rgba(220, 38, 38, 0.08)",
          borderWidth: 2,
          pointRadius: 2,
          fill: true,
          tension: 0.3,
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: { callbacks: { label: (ctx) => ` $${ctx.parsed.y.toFixed(2)}` } }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 30, color: '#94a3b8' },
            grid: { color: 'rgba(51, 65, 85, 0.6)' }
          },
          y: {
            ticks: { callback: (v) => `$${v.toFixed(0)}`, color: '#94a3b8' },
            grid: { color: 'rgba(51, 65, 85, 0.6)' }
          }
        }
      }
    });
  }

  // ─── Helpers ───────────────────────────────────────────────────────────────
  function colorClass(n) {
    return n > 0 ? "positive" : n < 0 ? "negative" : "neutral";
  }
  function showLoader(show) {
    document.getElementById("loader").style.display = show ? "block" : "none";
  }
  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
  }
  function clearError() {
    const el = document.getElementById("errorMsg");
    el.textContent = "";
    el.style.display = "none";
  }
  function showCacheNotice(msg) {
    const el = document.getElementById("cacheNotice");
    el.textContent = msg;
    el.style.display = "block";
  }
</script>

</body>
</html>
