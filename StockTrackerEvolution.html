<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #263346;
      --accent:   #dc2626;
      --accent-h: #b91c1c;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --border:   #334155;
      --radius:   10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background-color: var(--surface);
      color: var(--text);
      text-align: center;
      padding: 1.25em;
      border-bottom: 1px solid var(--border);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    section {
      max-width: 860px;
      margin: 20px auto;
      background-color: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); opacity: 0.6; }

    button {
      background-color: var(--accent);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background-color: var(--accent-h); transform: translateY(-1px); }

    #stockData { margin-top: 20px; }
    #stockData p {
      margin: 8px 0;
      font-size: 0.95rem;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .positive { color: #4ade80; font-weight: bold; }
    .negative { color: #f87171; font-weight: bold; }
    .neutral  { color: var(--muted); }

    #homeButton {
      position: fixed;
      top: 12px; left: 12px;
      background-color: var(--surface);
      color: var(--text);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s;
    }
    #homeButton:hover { border-color: var(--accent); color: var(--accent); }

    #loader {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: var(--muted);
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errorMsg {
      color: #fca5a5;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      margin-top: 10px;
    }
    #cacheNotice {
      font-size: 0.82em;
      color: #93c5fd;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 8px 14px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }

    /* ── Chart controls ─────────────────────────────────── */
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    #chartTitle {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    .chart-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .ctrl-group {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 5px 11px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s, color 0.15s;
      transform: none;
    }
    .ctrl-btn:hover { background: var(--surface2); color: var(--text); transform: none; }
    .ctrl-btn.active { background: var(--accent); color: white; }

    .sma-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 11px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
      transform: none;
    }
    .sma-btn:hover { border-color: var(--accent); color: var(--text); transform: none; }
    .sma-btn.active { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }

    /* Chart containers */
    #lineChartWrap { margin-top: 4px; }
    #lineChartWrap canvas { width: 100% !important; }
    #candleChartWrap {
      margin-top: 4px;
      height: 380px;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Stock Tracker</h1>
</header>

<section id="stockSelection">
  <form id="stockForm" onsubmit="event.preventDefault(); getStockData(false);">
    <label for="stockSymbol">Enter Stock Symbol (e.g. AAPL, TSLA, MSFT):</label>
    <input type="text" id="stockSymbol" placeholder="e.g. AAPL" required />
    <button type="submit">Get Data</button>
    <button type="button" onclick="getStockData(true)" style="background:var(--surface2);border:1px solid var(--border);margin-left:8px;">Force Refresh</button>
  </form>
  <div id="loader"><span class="spinner"></span> Fetching stock data…</div>
  <div id="errorMsg"></div>
  <div id="cacheNotice"></div>
</section>

<section id="stockData">
  <!-- Stock information will appear here -->
</section>

<section id="chartSection" style="display:none;">
  <div class="chart-header">
    <h2 id="chartTitle">Price History</h2>
    <div class="chart-controls">
      <!-- Timeframe -->
      <div class="ctrl-group" id="tfGroup">
        <button class="ctrl-btn" data-tf="1W">1W</button>
        <button class="ctrl-btn" data-tf="1M">1M</button>
        <button class="ctrl-btn active" data-tf="3M">3M</button>
        <button class="ctrl-btn" data-tf="6M">6M</button>
        <button class="ctrl-btn" data-tf="1Y">1Y</button>
      </div>
      <!-- Chart type -->
      <div class="ctrl-group" id="typeGroup">
        <button class="ctrl-btn active" data-type="line">Line</button>
        <button class="ctrl-btn" data-type="candle">Candle</button>
      </div>
      <!-- SMA toggle -->
      <button class="sma-btn" id="smaToggle">SMA 20</button>
    </div>
  </div>

  <div id="lineChartWrap"><canvas id="stockChart"></canvas></div>
  <div id="candleChartWrap"></div>
</section>

<button id="homeButton" onclick="window.location.href='index.html'">Home</button>

<script>
  const API_KEY   = "019effbed54c4b939010eb1072ff71bc";
  const CACHE_TTL = 60 * 60 * 1000;

  // ── Chart state ──────────────────────────────────────────────────────────
  let chartInstance = null;
  let lwChart       = null;
  let currentValues = null;
  let currentSymbol = '';
  let currentTF     = '3M';
  let currentType   = 'line';
  let showSMA       = false;

  const TF_DAYS = { '1W': 5, '1M': 21, '3M': 63, '6M': 126, '1Y': 252 };

  // ── Wire up controls ─────────────────────────────────────────────────────
  document.querySelectorAll('#tfGroup .ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tfGroup .ctrl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTF = btn.dataset.tf;
      redrawChart();
    });
  });

  document.querySelectorAll('#typeGroup .ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#typeGroup .ctrl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      // Hide SMA toggle for candlestick (SMA on candle = visual noise)
      document.getElementById('smaToggle').style.display = currentType === 'line' ? '' : 'none';
      redrawChart();
    });
  });

  document.getElementById('smaToggle').addEventListener('click', () => {
    showSMA = !showSMA;
    document.getElementById('smaToggle').classList.toggle('active', showSMA);
    redrawChart();
  });

  // ── Main entry point ─────────────────────────────────────────────────────
  async function getStockData(forceRefresh = false) {
    const symbol = document.getElementById("stockSymbol").value.trim().toUpperCase();
    if (!symbol) return;

    showLoader(true);
    clearError();
    document.getElementById("stockData").innerHTML = "";
    document.getElementById("chartSection").style.display = "none";
    document.getElementById("cacheNotice").style.display  = "none";

    try {
      const { values, fromCache, cachedAt } = await fetchWithCache(symbol, forceRefresh);
      currentValues = values;
      currentSymbol = symbol;
      updateStockData(values, symbol);
      document.getElementById("chartSection").style.display = "block";
      redrawChart();

      if (fromCache) {
        const mins = Math.round((Date.now() - cachedAt) / 60000);
        showCacheNotice(`Showing cached data from ${mins} minute${mins !== 1 ? 's' : ''} ago. Click "Force Refresh" for live data.`);
      }
    } catch (err) {
      showError(err.message);
    } finally {
      showLoader(false);
    }
  }

  // ── Fetch with cache ─────────────────────────────────────────────────────
  async function fetchWithCache(symbol, forceRefresh) {
    const cacheKey = `twelvedata_${symbol}`;

    if (!forceRefresh) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const { timestamp, values } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TTL) {
          return { values, fromCache: true, cachedAt: timestamp };
        }
      }
    }

    // Fetch 1 full year (252 trading days)
    const url  = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=252&apikey=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.status === "error") {
      if (data.code === 429) throw new Error("API rate limit reached. Please wait a moment and try again.");
      if (data.code === 400) throw new Error(`Symbol "${symbol}" not found. Please check the ticker and try again.`);
      throw new Error(data.message || "Unknown API error.");
    }
    if (!data.values || data.values.length === 0) {
      throw new Error("No data returned. The symbol may be invalid or delisted.");
    }

    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), values: data.values }));
    return { values: data.values, fromCache: false };
  }

  // ── Render metrics ───────────────────────────────────────────────────────
  function updateStockData(values, symbol) {
    if (values.length < 2) { showError("Not enough data available for this stock."); return; }

    const latest  = parseFloat(values[0].close);
    const prev    = parseFloat(values[1].close);
    const weekVal = parseFloat(values[Math.min(5,  values.length - 1)].close);
    const monVal  = parseFloat(values[Math.min(21, values.length - 1)].close);

    const latestDate = values[0].datetime;
    const prevDate   = values[1].datetime;
    const weekDate   = values[Math.min(5,  values.length - 1)].datetime;
    const monDate    = values[Math.min(21, values.length - 1)].datetime;

    const dChg = latest - prev;
    const wChg = latest - weekVal;
    const mChg = latest - monVal;

    const fmt = (n) => Math.abs(n).toFixed(2);
    const pct = (chg, base) => ((chg / base) * 100).toFixed(2);
    const sgn = (n) => n >= 0 ? '+' : '-';

    document.getElementById("stockData").innerHTML = `
      <h2 style="margin-bottom:12px;">${symbol}</h2>
      <p><strong>Latest Closing Price:</strong> $${latest.toFixed(2)} <span style="color:#aaa;font-size:0.85em;">(${latestDate})</span></p>
      <p>
        <strong>Daily Change</strong>
        <span style="font-size:0.85em;color:gray;">(${prevDate} → ${latestDate})</span>:
        <span class="${colorClass(dChg)}">${sgn(dChg)}$${fmt(dChg)} (${pct(dChg, prev)}%)</span>
      </p>
      <p>
        <strong>Weekly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${weekDate} → ${latestDate})</span>:
        <span class="${colorClass(wChg)}">${sgn(wChg)}$${fmt(wChg)} (${pct(wChg, weekVal)}%)</span>
      </p>
      <p>
        <strong>Monthly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${monDate} → ${latestDate})</span>:
        <span class="${colorClass(mChg)}">${sgn(mChg)}$${fmt(mChg)} (${pct(mChg, monVal)}%)</span>
      </p>
    `;
  }

  // ── Master redraw ────────────────────────────────────────────────────────
  function redrawChart() {
    if (!currentValues || !currentSymbol) return;

    const days    = TF_DAYS[currentTF] || 63;
    const sliced  = currentValues.slice(0, Math.min(days, currentValues.length));
    const reversed = [...sliced].reverse(); // oldest → newest

    document.getElementById('chartTitle').textContent =
      `${currentSymbol} — ${currentTF} (${reversed.length} trading days)`;

    if (currentType === 'line') {
      document.getElementById('lineChartWrap').style.display  = 'block';
      document.getElementById('candleChartWrap').style.display = 'none';
      destroyLW();
      renderLineChart(reversed);
    } else {
      document.getElementById('lineChartWrap').style.display  = 'none';
      document.getElementById('candleChartWrap').style.display = 'block';
      destroyLine();
      renderCandleChart(reversed);
    }
  }

  // ── Line chart ───────────────────────────────────────────────────────────
  function renderLineChart(data) {
    destroyLine();

    const labels = data.map(v => v.datetime);
    const prices = data.map(v => parseFloat(v.close));
    const datasets = [{
      label: `${currentSymbol} Close`,
      data: prices,
      borderColor: 'rgba(220,38,38,0.9)',
      backgroundColor: 'rgba(220,38,38,0.08)',
      borderWidth: 2,
      pointRadius: data.length > 60 ? 0 : 2,
      fill: true,
      tension: 0.3,
    }];

    // SMA overlay
    if (showSMA && data.length >= 20) {
      const sma = calculateSMA(prices, 20);
      datasets.push({
        label: 'SMA 20',
        data: sma,
        borderColor: '#4ade80',
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: false,
        tension: 0.3,
        spanGaps: true,
      });
    }

    const ctx = document.getElementById('stockChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        animation: { duration: 300 },
        plugins: {
          legend: { display: showSMA },
          tooltip: { callbacks: { label: (ctx) => ` $${ctx.parsed.y.toFixed(2)}` } }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 8, maxRotation: 30, color: '#94a3b8' },
            grid:  { color: 'rgba(51,65,85,0.6)' }
          },
          y: {
            ticks: { callback: v => `$${v.toFixed(0)}`, color: '#94a3b8' },
            grid:  { color: 'rgba(51,65,85,0.6)' }
          }
        }
      }
    });
  }

  // ── Candlestick chart ────────────────────────────────────────────────────
  function renderCandleChart(data) {
    destroyLW();

    const wrap = document.getElementById('candleChartWrap');
    wrap.innerHTML = '';

    lwChart = LightweightCharts.createChart(wrap, {
      width:  wrap.clientWidth,
      height: 380,
      layout: { background: { color: '#1e293b' }, textColor: '#94a3b8' },
      grid:   { vertLines: { color: 'rgba(51,65,85,0.6)' }, horzLines: { color: 'rgba(51,65,85,0.6)' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#334155' },
      timeScale: { borderColor: '#334155', timeVisible: true },
    });

    const candleSeries = lwChart.addCandlestickSeries({
      upColor:          '#4ade80',
      downColor:        '#f87171',
      borderUpColor:    '#4ade80',
      borderDownColor:  '#f87171',
      wickUpColor:      '#4ade80',
      wickDownColor:    '#f87171',
    });

    candleSeries.setData(data.map(v => ({
      time:  v.datetime,
      open:  parseFloat(v.open),
      high:  parseFloat(v.high),
      low:   parseFloat(v.low),
      close: parseFloat(v.close),
    })));

    lwChart.timeScale().fitContent();

    // Responsive resize
    window.addEventListener('resize', () => {
      if (lwChart) lwChart.applyOptions({ width: wrap.clientWidth });
    });
  }

  // ── SMA calculation ──────────────────────────────────────────────────────
  function calculateSMA(prices, period) {
    return prices.map((_, i) => {
      if (i < period - 1) return null;
      const slice = prices.slice(i - period + 1, i + 1);
      return slice.reduce((a, b) => a + b, 0) / period;
    });
  }

  // ── Destroy helpers ──────────────────────────────────────────────────────
  function destroyLine() {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  }
  function destroyLW() {
    if (lwChart) { lwChart.remove(); lwChart = null; }
  }

  // ── Misc helpers ─────────────────────────────────────────────────────────
  function colorClass(n) { return n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral'; }
  function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }
  function clearError() {
    const el = document.getElementById('errorMsg');
    el.textContent = ''; el.style.display = 'none';
  }
  function showCacheNotice(msg) {
    const el = document.getElementById('cacheNotice');
    el.textContent = msg; el.style.display = 'block';
  }
</script>

</body>
</html>
