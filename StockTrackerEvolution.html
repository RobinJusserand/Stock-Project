<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
    }

    section {
      max-width: 800px;
      margin: 20px auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #4caf50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background-color: #45a049;
    }

    #stockData {
      margin-top: 20px;
    }

    #stockData p {
      margin: 10px 0;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      background: #f9f9f9;
    }

    .positive { color: #2e7d32; font-weight: bold; }
    .negative { color: #c62828; font-weight: bold; }
    .neutral  { color: #555; }

    canvas {
      width: 100%;
      margin-top: 20px;
    }

    #homeButton {
      position: fixed;
      top: 10px;
      left: 10px;
      background-color: #333;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #homeButton:hover {
      background-color: #555;
    }

    /* Loading spinner */
    #loader {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: #555;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #errorMsg {
      color: #c62828;
      background: #fdecea;
      border: 1px solid #f5c6cb;
      padding: 10px 14px;
      border-radius: 4px;
      display: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Stock Tracker</h1>
</header>

<section id="stockSelection">
  <form id="stockForm" onsubmit="event.preventDefault(); getStockData();">
    <label for="stockSymbol">Enter Stock Symbol (e.g. AAPL, TSLA, MSFT):</label>
    <input type="text" id="stockSymbol" placeholder="e.g. AAPL" required />
    <button type="submit">Get Data</button>
  </form>
  <div id="loader"><span class="spinner"></span> Fetching stock data…</div>
  <div id="errorMsg"></div>
</section>

<section id="stockData">
  <!-- Stock information will appear here -->
</section>

<section id="chartSection" style="display:none;">
  <h2 id="chartTitle">Price History</h2>
  <canvas id="stockChart"></canvas>
</section>

<button id="homeButton" onclick="window.location.href='index.html'">Home</button>

<script>
  const API_KEY = "S5KUD067OHAEXVLM";
  let chartInstance = null;

  async function getStockData() {
    const symbolRaw = document.getElementById("stockSymbol").value.trim().toUpperCase();

    if (!symbolRaw) return;

    showLoader(true);
    clearError();
    document.getElementById("stockData").innerHTML = "";
    document.getElementById("chartSection").style.display = "none";

    const apiUrl = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbolRaw}&apikey=${API_KEY}`;

    try {
      const response = await fetch(apiUrl);
      const data = await response.json();

      // Handle API-level errors
      if (data["Note"]) {
        showError("API rate limit reached. Please wait a minute and try again.");
        return;
      }
      if (data["Error Message"]) {
        showError(`Could not find data for symbol "${symbolRaw}". Please check the ticker and try again.`);
        return;
      }
      if (!data["Time Series (Daily)"]) {
        showError("No data returned. The symbol may be invalid or the API is temporarily unavailable.");
        return;
      }

      updateStockData(data, symbolRaw);
      renderChart(data, symbolRaw);

    } catch (error) {
      showError("Network error — could not fetch stock data. Please check your connection and try again.");
      console.error("Fetch error:", error);
    } finally {
      showLoader(false);
    }
  }

  function updateStockData(data, symbol) {
    const timeSeries = data["Time Series (Daily)"];
    const dates = Object.keys(timeSeries);

    // Guard against missing data points
    if (dates.length < 2) {
      showError("Not enough data available for this stock.");
      return;
    }

    const latestDate    = dates[0];
    const previousDate  = dates[1];
    const weekAgoDate   = dates[Math.min(5, dates.length - 1)];
    const monthAgoDate  = dates[Math.min(21, dates.length - 1)];

    const latestClose   = parseFloat(timeSeries[latestDate]["4. close"]);
    const previousClose = parseFloat(timeSeries[previousDate]["4. close"]);
    const weekAgoClose  = parseFloat(timeSeries[weekAgoDate]["4. close"]);
    const monthAgoClose = parseFloat(timeSeries[monthAgoDate]["4. close"]);

    const dailyChange   = latestClose - previousClose;
    const weekChange    = latestClose - weekAgoClose;
    const monthChange   = latestClose - monthAgoClose;

    const fmt = (n) => n.toFixed(2);
    const pct = (change, base) => ((change / base) * 100).toFixed(2);

    document.getElementById("stockData").innerHTML = `
      <h2 style="margin-bottom:12px;">${symbol}</h2>
      <p><strong>Latest Closing Price:</strong> $${fmt(latestClose)}</p>
      <p>
        <strong>Daily Change</strong>
        <span style="font-size:0.85em;color:gray;">(${formatDate(previousDate)} → ${formatDate(latestDate)})</span>:
        <span class="${colorClass(dailyChange)}">
          ${dailyChange >= 0 ? '+' : ''}$${fmt(dailyChange)} (${pct(dailyChange, previousClose)}%)
        </span>
      </p>
      <p>
        <strong>Weekly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${formatDate(weekAgoDate)} → ${formatDate(latestDate)})</span>:
        <span class="${colorClass(weekChange)}">
          ${weekChange >= 0 ? '+' : ''}$${fmt(weekChange)} (${pct(weekChange, weekAgoClose)}%)
        </span>
      </p>
      <p>
        <strong>Monthly Change</strong>
        <span style="font-size:0.85em;color:gray;">(${formatDate(monthAgoDate)} → ${formatDate(latestDate)})</span>:
        <span class="${colorClass(monthChange)}">
          ${monthChange >= 0 ? '+' : ''}$${fmt(monthChange)} (${pct(monthChange, monthAgoClose)}%)
        </span>
      </p>
    `;
  }

  function renderChart(data, symbol) {
    const timeSeries = data["Time Series (Daily)"];
    const dates  = Object.keys(timeSeries).slice(0, 60).reverse();
    const prices = dates.map(d => parseFloat(timeSeries[d]["4. close"]));

    // Destroy previous chart instance before creating a new one
    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    const ctx = document.getElementById("stockChart").getContext("2d");
    document.getElementById("chartTitle").textContent = `${symbol} — Last 60 Trading Days`;
    document.getElementById("chartSection").style.display = "block";

    chartInstance = new Chart(ctx, {
      type: "line",
      data: {
        labels: dates,
        datasets: [{
          label: `${symbol} Closing Price`,
          data: prices,
          borderColor: "rgba(75, 192, 192, 1)",
          backgroundColor: "rgba(75, 192, 192, 0.1)",
          borderWidth: 2,
          pointRadius: 2,
          fill: true,
          tension: 0.3,
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: (ctx) => ` $${ctx.parsed.y.toFixed(2)}`
            }
          }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 30 }
          },
          y: {
            ticks: {
              callback: (val) => `$${val.toFixed(0)}`
            }
          }
        }
      }
    });
  }

  // --- Helpers ---

  function colorClass(change) {
    if (change > 0) return "positive";
    if (change < 0) return "negative";
    return "neutral";
  }

  function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  }

  function showLoader(show) {
    document.getElementById("loader").style.display = show ? "block" : "none";
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function clearError() {
    const el = document.getElementById("errorMsg");
    el.textContent = "";
    el.style.display = "none";
  }
</script>

</body>
</html>
